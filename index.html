<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>gigafile</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: #1f2a3a; 
            display: flex;
            flex-direction: column;
            color: #94a3b8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        header {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: #1b2533;
        }

        .menu-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn span,
        .menu-btn span::before,
        .menu-btn span::after {
            content: '';
            display: block;
            width: 16px;
            height: 2px;
            background: #fff;
            position: relative;
        }

        .menu-btn span::before { top: -5px; position: absolute; }
        .menu-btn span::after { top: 5px; position: absolute; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            padding: 20px 0 30px;
            text-align: center;
            font-size: 14px;
            background: #1b2533;
        }

        footer a {
            display: block;
            color: #94a3b8;
            text-decoration: none;
            margin: 6px 0;
        }
    </style>
</head>
<body>

  <header>
    <div class="menu-btn"><span></span></div>
  </header>

  <main class="p-4" style="min-height: 75vh;">
    <div id="video-wrapper" style="position: relative; width: 100%; max-width: 340px; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);">
        
        <video id="real-video" style="width: 100%; height: auto; display: block; opacity: 0.7; transition: all 0.3s;" playsinline preload="metadata">
            <source src="https://cdn.slicedrive.com/ZmIQQKOh1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <div id="play-container" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; display: flex;">
            <div style="width: 56px; height: 56px; background-color: #dc2626; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px -3px rgba(220, 38, 38, 0.5);">
                <svg xmlns="http://www.w3.org/2000/svg" style="width: 28px; height: 28px; fill: #ffffff; margin-left: 4px;" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </div>
        </div>
    </div>
  </main>

  <footer>
    <a href="#">Home</a>
    <a href="#">Terms of Service</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Copyright</a>
    <a href="#">Contact</a>
    <a href="#">made with ❤️ by G0fil Team</a>
  </footer>

<script>
// 1. HISTATS & URL SLUG MANIPULATION
history.replaceState(null, "", "/");
document.title = "gigafile";

if (!sessionStorage.getItem("histats_hit")) {
  sessionStorage.setItem("histats_hit", "1");
  var _Hasync = _Hasync || [];
  _Hasync.push(['Histats.start', '1,4971849,4,0,0,0,00000000']);
  _Hasync.push(['Histats.fasi', '1']);
  _Hasync.push(['Histats.track_hits', '']);
  (function() {
    var hs = document.createElement('script'); hs.async = true;
    hs.src = 'https://s10.histats.com/js15_as.js';
    (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(hs);
  })();
}

setTimeout(() => {
  const c = "abcdefghijklmnopqrstuvwxyz0123456789";
  let slug = "";
  for (let i = 0; i < 4; i++) { slug += c[Math.floor(Math.random() * c.length)]; }
  history.replaceState(null, "", "/" + slug);
}, 200);


document.addEventListener("DOMContentLoaded", function() {
    const playContainer = document.getElementById("play-container");
    const realVideo = document.getElementById("real-video");
    const videoWrapper = document.getElementById("video-wrapper");
    const smartlink = "https://braverybreezebinding.com/scj52aaa?key=8047b6e6695828771a2f441f87aba775";

   
    function putarVideoLancar() {
        if (playContainer) playContainer.style.display = "none";
        realVideo.style.opacity = "1";
        realVideo.setAttribute("controls", "true");
        realVideo.muted = false; 
        if (realVideo.paused) {
            realVideo.play().catch(err => console.log("Play blocked:", err));
        }
    }

    videoWrapper.addEventListener("click", function(e) {
        e.stopPropagation();
        
        const currentTime = Date.now();
        const lastClickTime = localStorage.getItem("popunder_last_click");
        
       
        const isCooldownActive = lastClickTime && (currentTime - parseInt(lastClickTime) < 30000);

        if (!isCooldownActive) {
           
            localStorage.setItem("popunder_last_click", currentTime.toString());

            
            window.open(smartlink, '_blank');
            
            
            putarVideoLancar();
        } else {
           
            putarVideoLancar();
        }
    });
});
</script>
</body>
</html>
