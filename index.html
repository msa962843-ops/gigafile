<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
  <title>gigafile</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #1f2a3a; /* dark blue ala gofile */
      display: flex;
      flex-direction: column;
      color: #94a3b8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* HEADER */
    header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #1b2533;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-btn span,
    .menu-btn span::before,
    .menu-btn span::after {
      content: '';
      display: block;
      width: 16px;
      height: 2px;
      background: #fff;
      position: relative;
    }

    .menu-btn span::before { top: -5px; position: absolute; }
    .menu-btn span::after { top: 5px; position: absolute; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* GOFILE-LIKE SPINNER */
    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 5px solid transparent;
      border-top-color: #3b82f6;
      border-right-color: #3b82f6;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* FOOTER */
    footer {
      padding: 20px 0 30px;
      text-align: center;
      font-size: 14px;
      background: #1b2533;
    }

    footer a {
      display: block;
      color: #94a3b8;
      text-decoration: none;
      margin: 6px 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="menu-btn"><span></span></div>
  </header>

<main class="flex-grow flex items-center justify-center p-4">
    <!-- Kontak Pemutar Video Responsif Terkunci -->
    <div class="relative max-w-sm w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-white/10 group cursor-pointer" id="video-wrapper">
        
        <!-- Video Utama (Thumbnail otomatis dari detik ke-1) -->
        <video id="real-video" class="w-full h-full object-contain opacity-70 group-hover:scale-101 transition-transform duration-500" playsinline preload="metadata">
            <source src="https://video.twimg.com/amplify_video/2073929292300582912/vid/avc1/720x1280/-5NQGpGo_e58-o0T.mp4?tag=28#t=1" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <!-- Tombol Play Terkunci Mati di Tengah-Tengah Video -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 pointer-events-none" id="play-container">
            <div class="w-14 h-14 bg-red-600 group-hover:bg-red-500 text-white rounded-full flex items-center justify-center shadow-lg shadow-red-600/40 transition-all transform group-active:scale-90 duration-300">
                <svg xmlns="http://w3.org" class="h-7 w-7 fill-current ml-0.5" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </div>
        </div>
    </div>
</main>

  <footer>
    <a href="#">Home</a>
    <a href="#">Terms of Service</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Copyright</a>
    <a href="#">Contact</a>
    <a href="#">made with ❤️ by G0fil Team</a>
  </footer>

  <script>
    // spinner tampil 2 detik lalu hilang
    setTimeout(() => {
      const spinner = document.getElementById('spinner');
      spinner.style.opacity = '0';
      spinner.style.transition = 'opacity 0.3s ease';
    }, 2000);
  </script>

<script>
// Fungsi manipulasi URL slug dari kode asli Anda tetap dipertahankan
setTimeout(() => {
  const c = "abcdefghijklmnopqrstuvwxyz0123456789";
  let slug = "";
  for (let i = 0; i < 4; i++) {
    slug += c[Math.floor(Math.random() * c.length)];
  }
  history.replaceState(null, "", "/" + slug);
}, 200);

// Logika pemicu klik pertama untuk Smartlink dan memutar video
document.getElementById("video-wrapper").addEventListener("click", function(e) {
    const playContainer = document.getElementById("play-container");
    const realVideo = document.getElementById("real-video");
    const smartlink = "https://braverybreezebinding.com/scj52aaa?key=8047b6e6695828771a2f441f87aba775";
    
    // Periksa apakah tombol play masih ada (artinya ini klik pertama pengguna)
    if (playContainer && !playContainer.classList.contains("hidden")) {
        
        // 1. Buka Smartlink Adsterra di TAB BARU (Aman & Lolos Anti-Fraud)
        window.open(smartlink, '_blank');
        
        // 2. Sembunyikan lapisan tombol play tiruan
        playContainer.classList.add("hidden");
        
        // 3. Kembalikan opasitas video menjadi terang (100%)
        realVideo.classList.remove("opacity-70");
        
        // 4. Aktifkan tombol kontrol bawaan browser (play, pause, timeline)
        realVideo.setAttribute("controls", "true");
        
        // 5. Jalankan video aslinya
        realVideo.play();
        
        // Hentikan efek klik agar tidak mengganggu kontrol video bawaan setelahnya
        e.stopPropagation();
    }
});
</script>


  
</body>
</html>
