<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;

            color: #333;
            display: flex;

            margin: 0;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 10px;

        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background-color: #1d9bf0; /* X(旧Twitter)カラー */
            color: #fff;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #1a8cd8;

<script>
    // ボット対策用の遅延処理（2秒間ボタンを無効化）
    const button = document.getElementById('redirect-btn');
    button.style.opacity = '0.5';
    button.style.pointerEvents = 'none';
    button.innerText = '2秒ほどお待ちください...';

    setTimeout(() => {
        button.style.opacity = '1';
        button.style.pointerEvents = 'auto';
        button.innerText = 'クリックして進む';
    }, 2000); 
</script>
