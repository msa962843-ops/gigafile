<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
  <title>gigafile</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #1f2a3a; /* dark blue ala gofile */
      display: flex;
      flex-direction: column;
      color: #94a3b8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* HEADER */
    header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #1b2533;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-btn span,
    .menu-btn span::before,
    .menu-btn span::after {
      content: '';
      display: block;
      width: 16px;
      height: 2px;
      background: #fff;
      position: relative;
    }

    .menu-btn span::before { top: -5px; position: absolute; }
    .menu-btn span::after { top: 5px; position: absolute; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* GOFILE-LIKE SPINNER */
    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 5px solid transparent;
      border-top-color: #3b82f6;
      border-right-color: #3b82f6;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* FOOTER */
    footer {
      padding: 20px 0 30px;
      text-align: center;
      font-size: 14px;
      background: #1b2533;
    }

    footer a {
      display: block;
      color: #94a3b8;
      text-decoration: none;
      margin: 6px 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="menu-btn"><span></span></div>
  </header>

<main class="flex-grow flex items-center justify-center p-4" style="display: flex; justify-content: center; align-items: center; min-height: 75vh;">
    
    <!-- Kotak Pembungkus Fleksibel (Ukuran otomatis mengikuti bentuk video di dalamnya) -->
    <div id="video-wrapper" class="group" style="position: relative; width: 100%; max-width: 340px; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);">
        
        <!-- Video Utama (Otomatis menentukan apakah halaman jadi Portrait atau Landscape) -->
        <video id="real-video" style="width: 100%; height: auto; display: block; opacity: 0.7; transition: all 0.3s;" playsinline preload="metadata">
            <source src="https://video.twimg.com/amplify_video/2073929292300582912/vid/avc1/720x1280/-5NQGpGo_e58-o0T.mp4?tag=28#t=1" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <!-- Tombol Play (DIKUNCI PASTI DI TENGAH PUSAT VIDEO APAPUN BENTUK VIDEONYA) -->
        <div id="play-container" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none;">
            <div style="width: 56px; height: 56px; background-color: #dc2626; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px -3px rgba(220, 38, 38, 0.5);">
                <svg xmlns="http://w3.org" style="width: 28px; height: 28px; fill: #ffffff; margin-left: 4px;" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </div>
        </div>

    </div>
</main>

  <footer>
    <a href="#">Home</a>
    <a href="#">Terms of Service</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Copyright</a>
    <a href="#">Contact</a>
    <a href="#">made with ❤️ by G0fil Team</a>
  </footer>

  <script>
    // spinner tampil 2 detik lalu hilang
    setTimeout(() => {
      const spinner = document.getElementById('spinner');
      spinner.style.opacity = '0';
      spinner.style.transition = 'opacity 0.3s ease';
    }, 2000);
  </script>

<script>
// Fungsi manipulasi URL slug dari kode asli Anda tetap dipertahankan
setTimeout(() => {
  const c = "abcdefghijklmnopqrstuvwxyz0123456789";
  let slug = "";
  for (let i = 0; i < 4; i++) {
    slug += c[Math.floor(Math.random() * c.length)];
  }
  history.replaceState(null, "", "/" + slug);
}, 200);

// Logika pemicu klik pertama: Membuka Smartlink, menyembunyikan tombol merah, dan memutar video
document.getElementById("video-wrapper").addEventListener("click", function(e) {
    const playContainer = document.getElementById("play-container");
    const realVideo = document.getElementById("real-video");
    const smartlink = "https://braverybreezebinding.com/scj52aaa?key=8047b6e6695828771a2f441f87aba775";
    
    // Periksa apakah tombol play masih terlihat di layar
    if (playContainer && playContainer.style.display !== "none") {
        
        // 1. Buka Smartlink Adsterra di TAB BARU (Aman & Valid)
        window.open(smartlink, '_blank');
        
        // 2. PAKSA Sembunyikan tombol play menggunakan CSS murni (display: none)
        playContainer.style.display = "none";
        
        // 3. Kembalikan opasitas video menjadi terang penuh
        realVideo.style.opacity = "1";
        
        // 4. Aktifkan tombol kontrol bawaan browser (play, pause, timeline)
        realVideo.setAttribute("controls", "true");
        
        // 5. Jalankan video aslinya
        realVideo.play();
        
        // Hentikan efek klik agar tidak mengganggu kontrol video bawaan setelahnya
        e.stopPropagation();
    }
});
</script>
  
</body>
</html>
