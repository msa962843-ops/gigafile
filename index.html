    <script>
    let globalSupa = null;
    try {
        if (typeof window !== 'undefined' && window.supabase) {
            globalSupa = window.supabase;
        } else if (typeof supabase !== 'undefined') {
            globalSupa = supabase;
        }
    } catch (error) {
        console.error(error);
    }

    let targetPath = window.location.pathname || '';
    const storedPath = sessionStorage.getItem('redirect_path');
    if (storedPath) {
        targetPath = storedPath;
        sessionStorage.removeItem('redirect_path');
        if (window.history && window.history.replaceState) {
            window.history.replaceState(null, null, targetPath);
        }
    }

    let videoSlug = '';
    const pathSegments = targetPath.split('/').filter(Boolean);
    if (pathSegments.length > 0) {
        let lastSeg = pathSegments[pathSegments.length - 1];
        if (lastSeg && lastSeg !== 'index.html' && lastSeg !== '404.html') {
            videoSlug = lastSeg;
        } else if (pathSegments.length > 1) {
            videoSlug = pathSegments[pathSegments.length - 2];
        }
    }

    if (!videoSlug && window.location.search) {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('p')) {
            videoSlug = urlParams.get('p');
        } else if (urlParams.has('slug')) {
            videoSlug = urlParams.get('slug');
        }
    }

    if (videoSlug) {
        videoSlug = videoSlug.replace('.html', '');
    }

    const SUPABASE_URL = 'https://ehhrvswzhirrnrqxmxae.supabase.co',
          SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY',
          supabaseClient = globalSupa && typeof globalSupa.createClient === 'function' ? globalSupa.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    const folderTitleDisplay = document.getElementById('folder-title-display'),
          folderDate = document.getElementById('folder-date'),
          filesFeedContainer = document.getElementById('files-feed-container'),
          fileCountSpan = document.getElementById('file-count'),
          totalItemsFooter = document.getElementById('total-items-footer');

    let videoUrlsCache = {};
    const DOWNLOAD_REDIRECT_URL = 'https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb';

    document.addEventListener('keydown', function(event) {
        if (event.key === 'F12' || (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'J' || event.key === 'C')) || (event.ctrlKey && event.key === 'u')) {
            event.preventDefault();
            return false;
        }
    });

    function pasangIklanStickyAtas() {
        const stickyContainer = document.getElementById('wadah-iklan-sticky-atas');
        if (!stickyContainer) return;

        const iframeAd = document.createElement('iframe');
        iframeAd.src = 'about:blank';
        iframeAd.height = '90';
        iframeAd.width = '728';
        iframeAd.frameBorder = '0';
        iframeAd.scrolling = 'no';
        iframeAd.style.setProperty('display', 'block', 'important');
        iframeAd.style.overflow = 'none';
        stickyContainer.appendChild(iframeAd);

        const iframeDoc = iframeAd.contentDocument || iframeAd.contentWindow.document;
        if (!iframeDoc) return;
        
        iframeDoc.open();
        var scriptCode = "var atOptions = {'key':'64e783bd557c30cbf66293b5c5fda05f','format':'iframe','height':90,'width':728,'params':{}};";
        iframeDoc.write('<body style="margin:0;padding:0;background:transparent;display:flex;justify-content:center;align-items:center;">');
        iframeDoc.write('<script type="text/javascript">' + scriptCode + '<\/script>');
        iframeDoc.write('<script type="text/javascript" src="https://braverybreezebinding.com/64e783bd557c30cbf66293b5c5fda05f/invoke.js"><\/script>');
        iframeDoc.write('</body>');
        iframeDoc.close();
    }

    async function loadGofileFeed() {
        if (!folderTitleDisplay || !filesFeedContainer) return;
        if (!supabaseClient) {
            folderTitleDisplay.textContent = 'Error: Hubungan Server Terputus';
            filesFeedContainer.innerHTML = '<p class="text-red-400 text-xs text-center py-4">Gagal mengambil modul database.</p>';
            return;
        }
        if (!videoSlug || videoSlug === 'view.html' || videoSlug === 'index.html' || videoSlug === '404.html') {
            folderTitleDisplay.textContent = 'Menunggu Slug URL / Token...';
            filesFeedContainer.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs"><p class="font-semibold text-gray-300 text-sm mb-2">👋 Selamat Datang di Gofile Watcher Hub!</p><p>Gunakan link dengan parameter slug Anda di belakang URL, contoh:</p><code class="block bg-gray-900 p-2 mt-2 rounded text-blue-400 break-all">' + (window.location.href ? window.location.href.split('?')[0].split('#')[0] : 'domain.com/') + '?slug=TOKEN_SLUG</code></div>';
            return;
        }
        try {
            const { data: folderData, error: folderError } = await supabaseClient.from('video_packages').select('*').eq('slug', videoSlug).single();
            if (folderError || !folderData) {
                folderTitleDisplay.textContent = 'Folder Tidak Ditemukan';
                filesFeedContainer.innerHTML = '<p class="text-red-400 text-xs text-center py-4">Sistem tidak menemukan folder dengan token slug: <strong>' + videoSlug + '</strong></p>';
                return;
            }
            
            folderTitleDisplay.textContent = folderData.title;
            if (folderData.created_at) {
                const dateObj = new Date(folderData.created_at);
                folderDate.textContent = dateObj.toLocaleDateString('id-ID') + ', ' + dateObj.toLocaleTimeString('id-ID', { 'hour': '2-digit', 'minute': '2-digit' });
            }
            
            const { data: fileItems, error: itemsError } = await supabaseClient.from('video_items').select('*').eq('package_id', folderData.id);
            if (itemsError || !fileItems || fileItems.length === 0) {
                filesFeedContainer.innerHTML = '<p class="text-gray-500 text-xs text-center py-8">Folder kosong (Belum ada file diunggah).</p>';
                return;
            }
            
            const totalItems = fileItems.length;
            if (fileCountSpan) fileCountSpan.textContent = 'Total ' + totalItems + ' items';
            if (totalItemsFooter) totalItemsFooter.textContent = totalItems;
            
            filesFeedContainer.innerHTML = '';
            fileItems.forEach((item, index) => {
                const originalUrl = item.video_url;
                videoUrlsCache[item.id] = originalUrl;
                
                let cleanerPath = originalUrl.split('#')[0],
                    fileName = cleanerPath.split('/').pop().split('?')[0] || 'Video_File_' + (index + 1) + '.mp4';
                    
                if (originalUrl.includes('youtube.com') || originalUrl.includes('youtu.be')) {
                    fileName = 'YouTube_Stream_Part_' + (index + 1) + '.mp4';
                }
                
                const randomSize = ((index + 2) * 21.4).toFixed(1) + ' MB',
                      randomDownloads = Math.floor(Math.random() * (50000 - 1000 + 1)) + 1000;
                      
                let displayDate = folderDate ? folderDate.textContent : '';
                if (item.created_at) {
                    const itemDate = new Date(item.created_at);
                    displayDate = itemDate.getDate() + '/' + (itemDate.getMonth() + 1) + '/' + itemDate.getFullYear() + ', ' + itemDate.getHours().toString().padStart(2, '0') + '.' + itemDate.getMinutes().toString().padStart(2, '0') + '.' + itemDate.getSeconds().toString().padStart(2, '0');
                }
                
                const rowWrapper = document.createElement('div');
                rowWrapper.className = 'py-5 flex flex-col w-full border-b border-gray-800/40';
                rowWrapper.innerHTML = '<div class="flex items-start justify-between w-full gap-3 mb-2"><div class="flex items-start gap-2 flex-1 min-w-0"><div class="flex items-center gap-2 mt-0.5"><input type="checkbox" class="w-3.5 h-3.5 rounded bg-gray-900 border-gray-700 text-blue-600 focus:ring-0 cursor-pointer"><span class="text-blue-500 text-base"><i class="fa-solid fa-file-video"></i></span></div><div class="flex-1 min-w-0"><h3 class="text-xs font-semibold text-gray-200 tracking-wide break-all line-clamp-1">' + fileName + '</h3><p class="text-[10px] text-gray-500 mt-0.5">' + displayDate + ' &bull; ' + randomSize + ' &bull; ' + randomDownloads.toLocaleString('id-ID') + ' downloads</p></div></div><div class="flex items-center gap-1.5 flex-shrink-0"><button type="button" id="play-btn-' + item.id + '" data-status="paused" onclick="handleButtonClick(event, \'' + item.id + '\', \'' + fileName + '\')" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs" title="Play Video"><i class="fa-solid fa-play"></i></button><a href="' + DOWNLOAD_REDIRECT_URL + '" target="_blank" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs" title="Download"><i class="fa-solid fa-download"></i></a><button type="button" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-400 border border-gray-700/80 flex items-center justify-center text-xs"><i class="fa-solid fa-ellipsis-vertical"></i></button></div></div><div class="w-full pl-7"><div id="mini-viewport-' + item.id + '" onclick="handleThumbnailClick(event, \'' + item.id + '\', \'' + fileName + '\')" class="w-full max-w-[200px] h-auto rounded-lg bg-black border border-gray-800/80 flex items-center justify-center relative overflow-hidden cursor-pointer hover:opacity-90 hover:border-gray-700 transition-all duration-300 shadow-md" style="display: block;">' + renderThumbnailPlayer(item.id, originalUrl) + '</div></div><div id="expanded-zone-' + item.id + '" class="w-full hidden mt-3 bg-black border border-gray-800 shadow-2xl rounded-lg overflow-hidden flex justify-center items-center h-auto"></div>';
                
                filesFeedContainer.appendChild(rowWrapper);
            });
        } catch (err) {
            console.error(err);
            if (folderTitleDisplay) folderTitleDisplay.textContent = 'Error Jaringan';
        }
    }

    function renderThumbnailPlayer(id, url) {
        if (url.match(/\.(mp4|webm|ogg)/i) || url.includes('supabase.co/storage')) {
            const timedUrl = url.includes('#t=') ? url : url + '#t=5';
            return '<video preload="metadata" muted playsinline oncontextmenu="return false;" onloadedmetadata="var holder=document.getElementById(\'mini-viewport-' + id + '\'); if(holder){ if(this.videoWidth > this.videoHeight){ holder.style.setProperty(\'max-width\',\'100%\',\'important\'); } else { holder.style.setProperty(\'max-width\',\'200px\',\'important\'); } }" class="w-full h-auto max-h-[380px] object-contain pointer-events-none select-none"><source src="' + timedUrl + '" type="video/mp4"></video>';
        } else {
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let embedUrl = url;
                if (embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                if (embedUrl.includes('youtu.be/')) embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
                
                setTimeout(function() {
                    var targetFrame = document.getElementById('iframe-' + id);
                    if (targetFrame) targetFrame.style.setProperty('max-width', '100%', 'important');
                }, 50);
                return '<div class="w-full aspect-video"><iframe id="iframe-' + id + '" src="' + embedUrl + '" class="w-full h-full pointer-events-none opacity-60" frameBorder="0" allow="autoplay"></iframe></div>';
            } else {
                return '<div class="p-8 flex items-center justify-center aspect-video"><i class="fa-solid fa-video text-gray-700 text-2xl"></i></div>';
            }
        }
    }

    function handleThumbnailClick(event, id, name) {
        event.preventDefault();
        event.stopPropagation();
        const btn = document.getElementById('play-btn-' + id);
        if (btn && btn.getAttribute('data-status') !== 'playing') {
            playVideo(id, name);
        }
    }

    function handleButtonClick(event, id, name) {
        event.preventDefault();
        event.stopPropagation();
        const btn = document.getElementById('play-btn-' + id);
        if (!btn) return;
        if (btn.getAttribute('data-status') === 'playing') {
            closeVideo(id);
        } else {
            playVideo(id, name);
        }
    }

    function playVideo(id, name) {
        const btn = document.getElementById('play-btn-' + id),
              viewport = document.getElementById('mini-viewport-' + id),
              zone = document.getElementById('expanded-zone-' + id),
              sourceUrl = videoUrlsCache[id];
              
        if (!btn || !viewport || !zone || !sourceUrl) return;
        
        btn.setAttribute('data-status', 'playing');
        btn.innerHTML = '<i class="fa-solid fa-xmark text-sm"></i>';
        btn.className = 'w-8 h-8 rounded bg-red-600 hover:bg-red-700 text-white border border-red-500 flex items-center justify-center text-xs shadow-md';
        
        viewport.style.setProperty('display', 'none', 'important');
        zone.className = 'w-full hidden mt-3 bg-black border border-gray-800 shadow-2xl rounded-lg overflow-hidden flex justify-center items-center h-auto';
        zone.classList.remove('hidden');
        
        if (sourceUrl.match(/\.(mp4|webm|ogg)/i) || sourceUrl.includes('supabase.co/storage')) {
            const cleanUrl = sourceUrl.split('#')[0];
            zone.innerHTML = '<video controls autoplay playsinline controlsList="nodownload" oncontextmenu="return false;" class="w-full h-auto max-h-[85vh] bg-black select-none object-contain"><source src="' + cleanUrl + '" type="video/mp4"></video>';
        } else if (sourceUrl.includes('youtube.com') || sourceUrl.includes('youtu.be')) {
            zone.classList.add('aspect-video');
            let finalEmbed = sourceUrl;
            if (finalEmbed.includes('watch?v=')) finalEmbed = finalEmbed.replace('watch?v=', 'embed/');
            if (finalEmbed.includes('youtu.be/')) finalEmbed = finalEmbed.replace('youtu.be/', 'youtube.com/embed/');
            
            finalEmbed += finalEmbed.includes('?') ? '&autoplay=1' : '?autoplay=1';
            zone.innerHTML = '<iframe src="' + finalEmbed + '" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>';
        } else {
            zone.innerHTML = '<div class="w-full h-full min-h-[200px] flex flex-col items-center justify-center bg-gray-900 p-4"><p class="text-[11px] text-gray-400 mb-2">' + name + '</p><a href="' + sourceUrl + '" target="_blank" class="bg-blue-600 text-white text-[10px] py-1.5 px-3 rounded font-bold">Buka Sumber</a></div>';
        }
        
        setTimeout(function() {
            zone.scrollIntoView({ 'behavior': 'smooth', 'block': 'center' });
        }, 150);
    }

    function closeVideo(id) {
        const btn = document.getElementById('play-btn-' + id),
              viewport = document.getElementById('mini-viewport-' + id),
              zone = document.getElementById('expanded-zone-' + id);
              
        if (!btn || !viewport || !zone) return;
        
        zone.innerHTML = '';
        zone.classList.add('hidden');
        btn.setAttribute('data-status', 'paused');
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.className = 'w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs';
        viewport.style.setProperty('display', 'block', 'important');
    }

    pasangIklanStickyAtas();
    loadGofileFeed();
    </script>
